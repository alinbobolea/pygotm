name: pygotm
channels:
  - conda-forge
  - nodefaults

# ---------------------------------------------------------------------------
# SCIENTIFIC-STACK REPRODUCIBILITY LOCK (pinned 2026-05-30)
#
# The numerical/scientific packages below are pinned to the exact versions
# installed in the current `pygotm` environment so that rebuilding or updating
# this shared env (for example, to add a documentation dependency such as
# sphinx-design) cannot silently move the stack the kernel's Frechet validation
# parity depends on: python, numba, llvmlite, numpy, scipy, gsw, netcdf4,
# xarray, pandas, pyfabm, dask, distributed.
#
# Application / dev / doc tooling is deliberately left at `>=` lower bounds —
# those packages do not affect kernel numerical results. Because the scientific
# packages are pinned, the solver must keep them fixed; if a loosely-bound
# package ever required a newer scientific version, the solve fails loudly
# rather than silently perturbing validation.
#
# To intentionally upgrade a pinned package: bump its pin here, rebuild, and
# re-run the kernel validation suite before committing the change.
# ---------------------------------------------------------------------------

dependencies:
  # Python runtime selected for pyGOTM and its development tooling.
  # pyproject.toml requires >=3.12 and configures tools for py312.
  - python=3.12.13

  # Project build and release tooling
  - hatchling
  - hatch
  # Local editable package registration only:
  # conda run -n pygotm python -m pip install --no-deps --no-build-isolation -e .
  - pip

  # Core numerical/scientific stack — PINNED (kernel validation depends on these)
  - numba=0.65.1
  - llvmlite=0.47.0
  - numpy=2.4.6
  - scipy=1.17.1
  - xarray=2026.4.0
  - netcdf4=1.7.4
  - pandas=3.0.3
  - gsw=3.6.21
  # Not numerical-stack, kept at lower bounds:
  - pyyaml>=6.0
  - pydantic>=2.6
  - click>=8.1

  # FABM Python interface from conda-forge — PINNED
  - pyfabm=3.0.0

  # Citation parsing and documentation figures
  - pybtex
  - matplotlib>=3.8
  # Frechet validation report plots
  - plotly>=5.19

  # Parallel/distributed runtime corresponding to dask[distributed] — PINNED
  - dask=2026.3.0
  - distributed=2026.3.0

  # ---------------------------------------------------------------------------
  # pyGOTM Studio runtime dependencies (MIT studio/application layer).
  # This env is a deliberate superset owning both kernel and studio runtime
  # deps; see pygotm-studio/AGENTS.md ("One conda env owns all dependencies").
  # The studio consumes the kernel only across the process boundary; declaring
  # its deps here does not weaken the GPL/MIT split.
  # ---------------------------------------------------------------------------
  - fastapi>=0.110
  - uvicorn>=0.27
  - uvicorn-standard>=0.27
  - websockets>=12.0
  - python-dotenv>=1.0
  - nicegui>=1.4
  - jinja2>=3.1
  - markdown-it-py>=3.0
  - httpx>=0.27
  - rich>=13.7
  - cmocean>=4.0
  - weasyprint>=60

  # Development dependencies
  - pytest>=8.0
  - anyio>=4.3
  - ruff>=0.3
  - mypy>=1.9
  - types-pyyaml>=6.0
  - pre-commit>=3.7
  - git-filter-repo
  # pyGOTM Studio dev tooling: REUSE/SPDX licensing compliance and the
  # import-linter kernel-boundary contract (forbids `import pygotm`).
  - reuse>=3.0
  - import-linter>=2.0

  # Documentation dependencies
  # Pin <9: Sphinx 9.x dropped SphinxUnreferencedFootnotesDetector, which the
  # current myst-parser/myst-nb still try to remove at setup (hard crash).
  - sphinx>=8.0,<9
  - sphinx-autodoc-typehints>=2.0
  - furo>=2024.0
  - myst-parser>=4.0
  - myst-nb>=1.1
  - sphinx-copybutton>=0.5.2
  - sphinxcontrib-mermaid>=0.9
  # Grid-card landing page, tabs, and status badges for the pyGOTM Studio docs
  # site (doc-only; does not affect the kernel numerical stack).
  - sphinx-design
