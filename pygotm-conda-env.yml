name: pygotm
channels:
  - conda-forge
  - nodefaults

dependencies:
  # Python runtime selected for pyGOTM and its development tooling.
  # pyproject.toml requires >=3.12 and configures tools for py312.
  - python=3.12

  # Project build and release tooling
  - hatchling
  - hatch
  # Local editable package registration only:
  # conda run -n pygotm python -m pip install --no-deps --no-build-isolation -e .
  - pip

  # Core numerical/scientific stack
  - numba>=0.59
  - numpy>=1.26
  - scipy>=1.12
  - xarray>=2024.1
  - netcdf4>=1.6
  - pyyaml>=6.0
  - pandas>=2.2
  - gsw>=3.6.0
  - pydantic>=2.6
  - click>=8.1

  # FABM Python interface from conda-forge
  - pyfabm

  # Citation parsing and documentation figures
  - pybtex
  - matplotlib>=3.8
  # Frechet validation report plots
  - plotly>=5.19

  # Parallel/distributed runtime corresponding to dask[distributed]
  - dask>=2024.4
  - distributed>=2024.4

  # Development dependencies
  - pytest>=8.0
  - anyio>=4.3
  - ruff>=0.3
  - mypy>=1.9
  - types-pyyaml>=6.0
  - pre-commit>=3.7
  - git-filter-repo

  # Documentation dependencies
  - sphinx>=8.0
  - sphinx-autodoc-typehints>=2.0
  - furo>=2024.0
  - myst-parser>=4.0
  - myst-nb>=1.1
  - sphinx-copybutton>=0.5.2
  - sphinxcontrib-mermaid>=0.9
